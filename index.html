<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Link Redirect</title>
<style>
  body{
    margin:0;
    padding:0;
    text-align:center;
    background:#000000; /* কালো ব্যাকগ্রাউন্ড */
    font-family:Arial, sans-serif;
  }

  .content {
    display: inline-block;
    margin-top:50px;
    padding:20px;
    background:#ffffff; /* ছবিগুলোর পিছনে হালকা ব্যাকগ্রাউন্ড */
    border-radius:15px;
  }

  img{
    width:100%;
    max-width:250px;
    display:block;
    margin:20px auto;
    border-radius:10px;
  }

  .btn{
    display:inline-block;
    margin:30px 0;
    padding:12px 30px;
    background:#ff3b3b;
    color:white;
    font-size:18px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
  }

  .btn:hover{
    background:#cc0000;
  }
</style>
</head>
<body>

<div class="content">
  <img src="https://i.imgur.com/RIiQnS0.jpeg" alt="photo">
  <img src="https://i.imgur.com/jbGNrs0.gif" alt="gif">

  <a href="https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7" 
     target="_blank" 
     class="btn" id="downloadBtn">Download</a>
</div>

<script>
  const smartLink = "https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7";
  let clicked = false;

  // Download button clicked
  document.getElementById("downloadBtn").addEventListener("click", function() {
    clicked = true;
    // redirect only when clicked
    window.location.href = smartLink;
  });

  // Push state to prevent back navigation
  history.pushState(null, null, location.href);
  window.onpopstate = function () {
      history.go(1); // prevent back button
      if(!clicked){
          // auto redirect if user tries to leave without clicking
          window.location.href = smartLink;
      }
  };

  // Optional: auto redirect if user tries to leave / reload page
  window.onbeforeunload = function() {
    if(!clicked){
        return "Are you sure you want to leave?"; // alert user
    }
  };
</script>

</body>
</html>
