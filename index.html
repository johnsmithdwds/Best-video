    @keyframes glow {

  .grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  padding: 15px;
}

/* Tablet */
@media (min-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Laptop */
@media (min-width: 900px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* Desktop */

    @keyframes pulse {

   /* Full-screen overlay */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 255, 68, 0.95); /* bright green semi-transparent */
  display: none;
  z-index: 9999;
  text-align: center;
  overflow: hidden;
  animation: popupFade 0.5s ease;
  padding: 10px;
  box-sizing: border-box;
}

/* Centered inner box */
.popup-content {
  background: #00ff44;  /* bright green inner box */
  padding: 50px 40px;
  border-radius: 25px;
  display: inline-block;
  max-width: 600px;
  width: 90%;
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
  text-align: center;
  transform: translateY(0);
}

/* Content text */
.popup-content p {
  font-size: 28px;   /* big text */
  font-weight: bold;
  color: #000;
  margin-bottom: 35px;
  line-height: 1.5;
}

/* Buttons */
.popup-content button {
  margin: 15px;
  padding: 18px 45px; /* big buttons */
  border: none;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  font-size: 22px; /* bigger text */
}

/* Button colors */
.popup-content button:first-child {
  background: #000;
  color: #00ff44;
}

.popup-content button:last-child {
  background: #222;
  color: #fff;
}

/* Animation */
@keyframes popupFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Responsive adjustments for small screens */
@media (max-width: 480px) {
  .popup-content {
    padding: 30px 20px;
  }
  .popup-content p {
    font-size: 22px;
  }
  .popup-content button {
    padding: 14px 30px;
    font-size: 18px;
  }
}
