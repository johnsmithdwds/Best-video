<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Now</title>
<style>
body{
  margin:0;
  padding:0;
  text-align:center;
  background:#000;
  font-family:Arial, sans-serif;
}
.content{
  margin-top:40px;
  padding:20px;
}
img{
  width:90%;
  max-width:260px;
  display:block;
  margin:20px auto;
  border-radius:10px;
}
.btn{
  display:inline-block;
  padding:14px 35px;
  background:#ff2a2a;
  color:white;
  font-size:20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
.btn:active{
  transform:scale(0.95);
}
</style>
</head>
<body>

<div class="content">
<img src="https://i.imgur.com/RIiQnS0.jpeg">
<img src="https://i.imgur.com/jbGNrs0.gif">
<a id="btn" class="btn">Download</a>
</div>

<script>
var smartLink = "https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7";
var clicked = false;

// push a dummy state to history
history.pushState({page: 1}, "", location.href);

// button click redirect
document.getElementById("btn").onclick = function(){
    clicked = true;
    window.location.href = smartLink;
};

// back button / popstate handler
window.addEventListener("popstate", function(event){
    if(!clicked){
        window.location.href = smartLink;
    }
});
</script>

</body>
</html>
